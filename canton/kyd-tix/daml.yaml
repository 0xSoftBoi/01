sdk-version: 2.10.4
name: kyd-tix
version: 0.1.0
source: daml
parties:
  - KYD-Operator
dependencies:
  - daml-prim
  - daml-stdlib
  - daml-script-lts
  - daml-trigger
# LF 1.17 (with Canton protocol version 7) enables Smart Contract Upgrade (SCU):
# new package versions can add Optional fields / choices with zero downtime and
# no contract migration. daml-script-lts is the SCU-compatible script library.
build-options:
  - --target=1.17
