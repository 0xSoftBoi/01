canton {
  // A real multi-participant Canton network: two independent participant nodes
  // (each is a separate trust/storage boundary) plus one synchronization domain
  // they both connect to. In-memory so it boots fast and leaves no state.
  participants {
    p1 {
      storage.type = memory
      ledger-api.port = 6011
      admin-api.port = 6012
    }
    p2 {
      storage.type = memory
      ledger-api.port = 6021
      admin-api.port = 6022
    }
  }
  domains {
    mydomain {
      storage.type = memory
      public-api.port = 6018
      admin-api.port = 6019
      init.domain-parameters.protocol-version = 7
    }
  }
}
