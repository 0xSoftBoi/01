canton {
  // A single participant whose ledger-api requires a valid RS256-signed,
  // JWKS-verified token for every call — the config this repo's server/
  // has, until now, only ever documented (server/README.md). `url` points
  // at THIS proof's own auth server (run.sh starts it on :4001 before any
  // token is ever presented here).
  participants {
    p1 {
      storage.type = memory
      ledger-api {
        port = 6041
        auth-services = [{
          type = jwt-rs-256-jwks
          url = "http://localhost:4001/.well-known/jwks.json"
          target-audience = "https://kyd-tix-ledger/"
        }]
      }
      admin-api.port = 6042
    }
  }
  domains {
    mydomain {
      storage.type = memory
      public-api.port = 6048
      admin-api.port = 6049
      init.domain-parameters.protocol-version = 7
    }
  }
}
