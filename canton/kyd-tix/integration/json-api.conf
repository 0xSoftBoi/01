# HTTP JSON API configuration. The JSON API is the HTTP/JSON bridge the KYD web
# app talks to: it translates REST-ish create/exercise/query calls into gRPC
# Ledger API calls, authenticated by the caller's JWT (which carries the acting
# party). See https://docs.daml.com/json-api/ .
{
  server {
    address = "0.0.0.0"
    port = 7575
  }
  ledger-api {
    address = "localhost"
    port = 6865
  }
  # In production, point this at the Canton participant's Ledger API and supply
  # JWT auth via the `auth` stanza; for local dev the sandbox issues unsigned
  # HMAC tokens (see run-local.sh).
}
